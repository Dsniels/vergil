<!-- @format -->
<div class="flex flex-row p-2">
	<div>
		<div>
			@for (item of messages; track $index) {
			<div>
				<nz-card style="width: 300px">
					<markdown [data]="item"></markdown>
				</nz-card>
			</div>
			}
		</div>

		<div>
			<nz-card style="width: 300px">
				<markdown [data]="response()"></markdown>
			</nz-card>
		</div>
	</div>
	<div>
		<p>
			Logs:
		</p>
		<nz-code-editor class="editor"  [nzEditorOption]="{ language: 'typescript' }" [nzOriginalText]="log()"> code</nz-code-editor>
	</div>
</div>
<div>
	<form [formGroup]="formGroup" (ngSubmit)="sendMessage()">
		<input
			nz-input
			nzSize="large"
			
			[(ngModel)]="question"
			[formControlName]="'question'" />
		<button nz-button type="submit">send</button>
	</form>
</div>
